<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Students Information</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/bootstrap-table@1.22.5/dist/bootstrap-table.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-5">

    <div class="card p-4 shadow">

        <div class="position-relative d-flex align-items-center mb-4">  

            <div class="position-absolute start-50 translate-middle-x"> 
                <h2 class="m-0">STUDENTS INFORMATIONS</h2>
            </div>

            <div class="ms-auto d-flex gap-2">

                <button class="btn btn-primary" id="btnAdd">
                    <i class="fa fa-plus"></i>
                </button>

                <button class="btn btn-success" id="btnEdit">
                    <i class="fa fa-edit"></i>
                </button>

                <button class="btn btn-danger" id="btnDelete">
                    <i class="fa fa-trash"></i>
                </button>

            </div>

        </div>

        <table id="table"></table>

    </div>

</div>


<!-- Student Modal -->

<div class="modal fade" id="studentModal">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">Student Information</h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <div class="row">

                    <!-- Full Name -->

                    <div class="col-md-6 mb-3">

                        <label>Full Name</label>

                        <input type="text" class="form-control" id="fullname">

                        <div class="invalid-feedback" id="fullnameError"></div>

                    </div>

                    <!-- Sex -->

                    <div class="col-md-6 mb-3">

                        <label>Sex</label>

                        <select class="form-select" id="sex">

                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>

                        </select>

                    </div>

                    <!-- DOB -->

                    <div class="col-md-6 mb-3">

                        <label>Date of Birth</label>

                        <input type="date" class="form-control" id="dob">

                        <div class="invalid-feedback" id="dobError"></div>

                    </div>

                    <!-- Email -->

                    <div class="col-md-6 mb-3">

                        <label>Email</label>

                        <input type="email" class="form-control" id="email">

                        <div class="invalid-feedback" id="emailError"></div>

                    </div>

                    <!-- Phone -->

                    <div class="col-md-6 mb-3">

                        <label>Phone</label>

                        <input type="text" class="form-control" id="phone">

                        <div class="invalid-feedback" id="phoneError"></div>

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button class="btn btn-success" id="btnSave">

                    <i class="fa fa-check"></i> Save

                </button>

                <button class="btn btn-danger" data-bs-dismiss="modal">

                    Close

                </button>

            </div>

        </div>

    </div>

</div>


<!-- Delete Modal -->

<div class="modal fade" id="deleteModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header bg-danger text-white">

                <h5 class="modal-title">
                    Delete Student
                </h5>

            </div>

            <div class="modal-body">

                Are you sure you want to delete the selected student?

            </div>

            <div class="modal-footer">

                <button class="btn btn-secondary"
                        data-bs-dismiss="modal">

                    No

                </button>

                <button class="btn btn-danger"
                        id="confirmDelete">

                    Yes

                </button>

            </div>

        </div>

    </div>

</div>


<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/bootstrap-table@1.22.5/dist/bootstrap-table.min.js"></script>

<script src="script.js"></script>

</body>
</html>
